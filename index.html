<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kehadiran Kokurikulum SKBTHO2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .view-container { display: none; }
        .view-container.active { display: block; }
        .sticky-col-name { position: sticky; left: 0; background: white; z-index: 10; border-right: 2px solid #f1f5f9; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8 pb-6 border-b border-slate-200">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-red-600 rounded-3xl flex items-center justify-center shadow-2xl shadow-red-200 rotate-3">
                    <i data-lucide="award" class="text-white w-10 h-10"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-slate-900 tracking-tighter leading-none">KOKU<span class="text-red-600">HUB</span></h1>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mt-2">SK Bandar Tun Hussein Onn 2</p>
                </div>
            </div>
            
            <div class="relative w-full md:w-96">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                <input type="text" id="global-search-input" placeholder="Cari nama murid..." 
                       class="w-full bg-white border-2 border-slate-100 rounded-2xl py-3 pl-12 pr-4 font-bold text-slate-700 shadow-sm focus:border-red-500 transition-all outline-none">
                <div id="global-search-results" class="hidden absolute top-full left-0 right-0 mt-2 bg-white rounded-2xl shadow-2xl border border-slate-100 overflow-hidden z-50">
                    <div id="search-results-content" class="max-h-64 overflow-y-auto"></div>
                </div>
            </div>
        </header>

        <nav class="flex flex-col lg:flex-row items-center justify-between gap-4 mb-10 bg-white p-3 rounded-[2.5rem] shadow-sm border border-slate-100">
            <div class="flex flex-wrap justify-center gap-2">
                <button id="tab-student-list" onclick="switchTab('student-list')" class="px-8 py-4 rounded-[1.8rem] font-black text-sm transition-all bg-red-500 text-white shadow-lg shadow-red-100">AHLI UNIT</button>
                <button id="tab-attendance" onclick="switchTab('attendance')" class="px-8 py-4 rounded-[1.8rem] font-black text-sm transition-all text-slate-600 hover:bg-slate-100">KEHADIRAN</button>
                <button id="tab-analytics" onclick="switchTab('analytics')" class="px-8 py-4 rounded-[1.8rem] font-black text-sm transition-all text-slate-600 hover:bg-slate-100">ANALISA</button>
            </div>
            <div class="px-6 py-2 bg-slate-50 rounded-2xl border border-slate-100 flex items-center gap-3">
                <i data-lucide="layers" class="w-4 h-4 text-red-500"></i>
                <input type="text" id="unit-input" onchange="saveUnitName()" placeholder="Nama Unit..." class="bg-transparent border-none font-bold text-slate-700 focus:ring-0 text-sm outline-none uppercase">
            </div>
        </nav>

        <main>
            <div id="view-student-list" class="view-container active">
                <div id="student-list-year-selection" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <button onclick="selectStudentListYear(4)" class="bg-white p-8 rounded-[2rem] border-2 border-slate-50 hover:border-red-500 transition-all text-left">
                        <div class="w-14 h-14 bg-red-50 rounded-2xl flex items-center justify-center mb-6"><span class="text-2xl font-black text-red-600">4</span></div>
                        <h3 class="text-xl font-black text-slate-900">Tahun 4</h3>
                        <p id="student-list-year4-count" class="text-slate-400 font-bold text-sm">0 murid</p>
                    </button>
                    <button onclick="selectStudentListYear(5)" class="bg-white p-8 rounded-[2rem] border-2 border-slate-50 hover:border-red-500 transition-all text-left">
                        <div class="w-14 h-14 bg-red-50 rounded-2xl flex items-center justify-center mb-6"><span class="text-2xl font-black text-red-600">5</span></div>
                        <h3 class="text-xl font-black text-slate-900">Tahun 5</h3>
                        <p id="student-list-year5-count" class="text-slate-400 font-bold text-sm">0 murid</p>
                    </button>
                    <button onclick="selectStudentListYear(6)" class="bg-white p-8 rounded-[2rem] border-2 border-slate-50 hover:border-red-500 transition-all text-left">
                        <div class="w-14 h-14 bg-red-50 rounded-2xl flex items-center justify-center mb-6"><span class="text-2xl font-black text-red-600">6</span></div>
                        <h3 class="text-xl font-black text-slate-900">Tahun 6</h3>
                        <p id="student-list-year6-count" class="text-slate-400 font-bold text-sm">0 murid</p>
                    </button>
                </div>

                <div id="student-list-data-view" class="hidden space-y-6">
                    <div class="flex justify-between items-center bg-white p-4 rounded-3xl border border-slate-100">
                        <button onclick="backToStudentListYearSelection()" class="p-3 bg-slate-100 rounded-xl hover:bg-slate-200 transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
                        <div class="flex gap-2">
                            <button id="print-student-list-btn" onclick="generateStudentListPDF()" class="px-5 py-3 bg-indigo-600 text-white rounded-2xl font-black text-sm flex items-center gap-2">Cetak Ahli</button>
                        </div>
                    </div>
                    <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden">
                        <div class="p-6 border-b border-slate-50 flex items-center gap-3">
                            <input type="text" id="student-list-name-input" placeholder="Nama Murid..." class="flex-1 bg-slate-50 border-none rounded-xl py-3 px-4 font-bold text-slate-700">
                            <input type="text" id="student-list-class-input" placeholder="Kelas" class="w-32 bg-slate-50 border-none rounded-xl py-3 px-4 font-bold text-slate-700">
                            <button id="add-student-list-btn" onclick="addStudentFromList()" class="bg-red-500 text-white p-3 rounded-xl shadow-lg"><i data-lucide="plus"></i></button>
                        </div>
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <tr><th class="px-6 py-4">Bil</th><th class="px-6 py-4">Nama</th><th class="px-6 py-4 text-center">Kelas</th><th class="px-6 py-4 text-center">Aksi</th></tr>
                            </thead>
                            <tbody id="student-list-body" class="divide-y divide-slate-50 font-medium"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="view-attendance" class="view-container">
                <div id="year-selection" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <button onclick="selectYear(4)" class="bg-white p-8 rounded-[2rem] border-2 border-slate-50 hover:border-red-500 transition-all text-left">
                        <div class="w-14 h-14 bg-red-50 rounded-2xl flex items-center justify-center mb-6"><span class="text-2xl font-black text-red-600">4</span></div>
                        <h3 class="text-xl font-black text-slate-900">Tahun 4</h3>
                    </button>
                    </div>

                <div id="attendance-data-view" class="hidden space-y-6">
                    <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <div class="grid grid-cols-2 md:grid-cols-6 gap-3">
                            <script>
                                for(let i=1; i<=12; i++) {
                                    document.write(`<div class="space-y-1"><label class="text-[9px] font-black text-slate-400 uppercase">P${i}</label><input type="date" class="date-input w-full bg-slate-50 border-none rounded-xl text-[10px] font-bold p-2" data-date="${i}"></div>`);
                                }
                            </script>
                        </div>
                    </div>
                    <div class="flex justify-between items-center bg-white p-4 rounded-3xl border border-slate-100">
                        <button onclick="backToYearSelection()" class="p-3 bg-slate-100 rounded-xl"><i data-lucide="arrow-left"></i></button>
                        <button id="download-pdf-btn" onclick="generateAttendancePDF()" class="px-6 py-3 bg-red-500 text-white rounded-2xl font-black text-sm flex items-center gap-2 shadow-lg shadow-red-100"><i data-lucide="file-text"></i> Cetak PDF</button>
                    </div>
                    <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[9px] font-black text-slate-400 uppercase tracking-widest">
                                <tr>
                                    <th class="px-4 py-4">Bil</th><th class="px-4 py-4 sticky-col-name">Nama Murid</th><th class="px-4 py-4 text-center">Kelas</th>
                                    <script>for(let i=1;i<=12;i++) document.write(`<th class="px-2 py-4 text-center">P${i}</th>`);</script>
                                    <th class="px-4 py-4 text-center bg-indigo-50 text-indigo-600">Jum</th>
                                </tr>
                            </thead>
                            <tbody id="attendance-body" class="divide-y divide-slate-50 font-medium text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzQ7R7V78v0fE37Lp5C7_4P4y2C_7G_p6H3m0G8C_Kz7C1g6x8/exec';
        let studentsData = [];
        let config = { unit_name: '' };
        let meetingDatesRecord = null;
        let selectedYear = null;
        let studentListYear = null;

        async function refreshData() {
            try {
                const res = await fetch(`${SHEET_URL}?t=${Date.now()}`);
                const data = await res.json();
                studentsData = data.filter(r => r.record_type === 'student');
                const confRec = data.find(r => r.record_type === 'unit_config');
                if (confRec) { config.unit_name = confRec.unit_name; document.getElementById('unit-input').value = config.unit_name; }
                meetingDatesRecord = data.find(r => r.record_type === 'meeting_dates');
                
                loadMeetingDates();
                updateYearCounts();
                if (studentListYear) renderStudentListRows();
                if (selectedYear) renderStudentRows();
            } catch (e) { console.error(e); }
        }

        async function syncToSheet(action, payload) {
            await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action, ...payload }) });
            await refreshData();
        }

        function switchTab(tab) {
            document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${tab}`).classList.add('active');
            
            const btns = ['tab-student-list', 'tab-attendance', 'tab-analytics'];
            btns.forEach(id => {
                const b = document.getElementById(id);
                b.className = "px-8 py-4 rounded-[1.8rem] font-black text-sm transition-all text-slate-600 hover:bg-slate-100";
            });
            document.getElementById(`tab-${tab}`).className = "px-8 py-4 rounded-[1.8rem] font-black text-sm transition-all bg-red-500 text-white shadow-lg shadow-red-100";
        }

        function updateYearCounts() {
            [4, 5, 6].forEach(y => {
                const count = studentsData.filter(s => s.year == y).length + ' murid';
                if(document.getElementById(`student-list-year${y}-count`)) document.getElementById(`student-list-year${y}-count`).textContent = count;
            });
        }

        function selectStudentListYear(y) { studentListYear = y; document.getElementById('student-list-year-selection').classList.add('hidden'); document.getElementById('student-list-data-view').classList.remove('hidden'); renderStudentListRows(); }
        function backToStudentListYearSelection() { studentListYear = null; document.getElementById('student-list-year-selection').classList.remove('hidden'); document.getElementById('student-list-data-view').classList.add('hidden'); }
        function renderStudentListRows() {
            const tbody = document.getElementById('student-list-body'); tbody.innerHTML = '';
            const filtered = studentsData.filter(s => s.year == studentListYear).sort((a,b) => (a.class_name||"").localeCompare(b.class_name||"") || a.name.localeCompare(b.name));
            filtered.forEach((s, i) => {
                tbody.innerHTML += `<tr><td class="px-6 py-4 font-bold text-slate-400">${i+1}</td><td class="px-6 py-4 font-black text-slate-900">${s.name}</td><td class="px-6 py-4 text-center font-bold text-indigo-600">${s.class_name||'-'}</td><td class="px-6 py-4 text-center">Padam</td></tr>`;
            });
        }

        function selectYear(y) { selectedYear = y; document.getElementById('year-selection').classList.add('hidden'); document.getElementById('attendance-data-view').classList.remove('hidden'); renderStudentRows(); }
        function backToYearSelection() { selectedYear = null; document.getElementById('year-selection').classList.remove('hidden'); document.getElementById('attendance-data-view').classList.add('hidden'); }
        function renderStudentRows() {
            const tbody = document.getElementById('attendance-body'); tbody.innerHTML = '';
            const filtered = studentsData.filter(s => s.year == selectedYear).sort((a,b) => (a.class_name||"").localeCompare(b.class_name||"") || a.name.localeCompare(b.name));
            filtered.forEach((s, i) => {
                let cells = ''; let total = 0;
                for(let j=1; j<=12; j++) {
                    const isP = s[`attendance_${j}`] === true || s[`attendance_${j}`] === 'true';
                    if(isP) total++;
                    cells += `<td class="px-2 py-3 text-center"><button class="w-8 h-8 rounded-lg border-2 ${isP?'bg-emerald-500 border-emerald-500 text-white':'border-slate-200 text-slate-300'}">${isP?'/':'O'}</button></td>`;
                }
                tbody.innerHTML += `<tr><td class="px-4 py-3 text-slate-400 font-bold">${i+1}</td><td class="px-4 py-3 font-black text-slate-900 sticky-col-name">${s.name}</td><td class="px-4 py-3 text-center font-bold text-indigo-600">${s.class_name||'-'}</td>${cells}<td class="px-4 py-3 text-center bg-indigo-50 font-black text-indigo-700">${total}</td></tr>`;
            });
        }

        function generateAttendancePDF() {
            if (!selectedYear) return;
            const students = studentsData.filter(s => s.year == selectedYear).sort((a,b) => (a.class_name||"").localeCompare(b.class_name||"") || a.name.localeCompare(b.name));
            const dates = [];
            for (let i = 1; i <= 12; i++) {
                const input = document.querySelector(`.date-input[data-date="${i}"]`);
                dates.push(input && input.value ? input.value.split('-').reverse().slice(0,2).join('/') : '-');
            }
            const rows = students.map((s, idx) => {
                let cells = ''; let count = 0;
                for(let j=1; j<=12; j++) {
                    const isP = s[`attendance_${j}`] === true || s[`attendance_${j}`] === 'true';
                    if(isP) count++;
                    cells += `<td style="border:1px solid #000; text-align:center; background:${isP?'#d1fae5':'#fee2e2'}">${isP?'/':'O'}</td>`;
                }
                return `<tr><td style="border:1px solid #000; text-align:center">${idx+1}</td><td style="border:1px solid #000; padding:5px">${s.name}</td><td style="border:1px solid #000; text-align:center">${s.class_name||'-'}</td>${cells}<td style="border:1px solid #000; text-align:center; font-weight:bold">${count}</td></tr>`;
            }).join('');

            const html = `<html><head><style>table{width:100%; border-collapse:collapse; font-family:Arial; font-size:10px} th,td{border:1px solid #000; padding:4px}</style></head><body onload="window.print()">
                <div style="text-align:center; margin-bottom:20px;">
                    <img src="https://i.imgur.com/DLy3jZn.png" style="height:60px; margin-bottom:10px;">
                    <h2 style="margin:0;">REKOD KEHADIRAN KOKURIKULUM 2026</h2>
                    <p><b>UNIT: ${config.unit_name} - TAHUN ${selectedYear}</b></p>
                </div>
                <table><thead><tr><th>Bil</th><th>Nama</th><th>Kelas</th><th>P1</th><th>P2</th><th>P3</th><th>P4</th><th>P5</th><th>P6</th><th>P7</th><th>P8</th><th>P9</th><th>P10</th><th>P11</th><th>P12</th><th>Jum</th></tr>
                <tr><th></th><th></th><th>Tarikh:</th><th>${dates[0]}</th><th>${dates[1]}</th><th>${dates[2]}</th><th>${dates[3]}</th><th>${dates[4]}</th><th>${dates[5]}</th><th>${dates[6]}</th><th>${dates[7]}</th><th>${dates[8]}</th><th>${dates[9]}</th><th>${dates[10]}</th><th>${dates[11]}</th><th></th></tr></thead>
                <tbody>${rows}</tbody></table></body></html>`;
            const win = window.open('','_blank'); win.document.write(html); win.document.close();
        }

        function loadMeetingDates() {
            if(!meetingDatesRecord) return;
            for(let i=1;i<=12;i++) {
                const inp = document.querySelector(`.date-input[data-date="${i}"]`);
                if(inp && meetingDatesRecord[`meeting_date_${i}`]) inp.value = meetingDatesRecord[`meeting_date_${i}`];
            }
        }

        document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); refreshData(); });
    </script>
</body>
</html>
